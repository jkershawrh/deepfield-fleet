name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: deepfield-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - run: python -m compileall -q app
      - run: python -m pytest -q

  manifests:
    name: Deployment contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - run: python -m pytest -q app/tests/test_deployment_contract.py

  gcl-contract:
    name: DeepField to GCL contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout DeepField
        uses: actions/checkout@v7
        with:
          path: deepfield-fleet
      - name: Checkout GCL consumer
        uses: actions/checkout@v7
        with:
          repository: jkershawrh/governed-cognitive-loop
          path: governed-cognitive-loop
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install both contract owners
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./deepfield-fleet[dev]" -e "./governed-cognitive-loop[dev]"
      - name: Validate emitted events with GCL's current consumer
        working-directory: deepfield-fleet
        run: python scripts/verify_gcl_contract.py
