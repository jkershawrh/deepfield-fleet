apiVersion: v1
kind: ServiceAccount
metadata:
  name: deepfield-reader
  namespace: deepfield-fleet
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"deepfield-fleet"}}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: deepfield-reader-binding
subjects:
  - kind: ServiceAccount
    name: deepfield-reader
    namespace: deepfield-fleet
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-reader
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepfield-fleet
  namespace: deepfield-fleet
  labels:
    app: deepfield-fleet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deepfield-fleet
  template:
    metadata:
      labels:
        app: deepfield-fleet
    spec:
      serviceAccountName: deepfield-reader
      securityContext:
        runAsNonRoot: true
      containers:
        - name: app
          image: quay.io/deepfield-fleet/deepfield-fleet:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: LITELLM_MODEL_MICRO
              value: "granite-3-2-8b-instruct-cpu"
            - name: LITELLM_MODEL_MACRO
              value: "granite-3-2-8b-instruct-cpu"
            - name: BOOTSTRAP_MODEL
              value: "qwen3-235b"
          envFrom:
            - secretRef:
                name: deepfield-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
        - name: oauth-proxy
          image: registry.redhat.io/openshift4/ose-oauth-proxy-rhel9:latest
          args:
            - -provider=openshift
            - -http-address=:8080
            - -https-address=
            - -email-domain=*
            - -upstream=http://localhost:8000/
            - -client-id=deepfield-fleet-oauth
            - -client-secret-file=/etc/proxy/secrets/client-secret
            - -cookie-secret-file=/etc/proxy/secrets/session_secret
            - -openshift-service-account=deepfield-reader
            - -openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - -skip-auth-regex=^/health
            - -upstream-timeout=180s
            - -pass-user-headers=true
          ports:
            - containerPort: 8080
              name: oauth-proxy
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          readinessProbe:
            httpGet:
              path: /oauth/healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /oauth/healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - mountPath: /etc/proxy/secrets
              name: oauth-proxy-secret
              readOnly: true
      volumes:
        - name: oauth-proxy-secret
          secret:
            secretName: deepfield-oauth-secret
---
apiVersion: v1
kind: Service
metadata:
  name: deepfield-fleet
  namespace: deepfield-fleet
  labels:
    app: deepfield-fleet
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: deepfield-fleet-tls
spec:
  selector:
    app: deepfield-fleet
  ports:
    - name: oauth-proxy
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: deepfield-fleet
  namespace: deepfield-fleet
spec:
  to:
    kind: Service
    name: deepfield-fleet
  port:
    targetPort: oauth-proxy
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
