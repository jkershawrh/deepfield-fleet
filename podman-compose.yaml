version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
      - GCL_EVENT_SINK_URL=${GCL_EVENT_SINK_URL:-}
      - GCL_EVENT_SINK_TOKEN=${GCL_EVENT_SINK_TOKEN:-}
      - DEEPFIELD_TENANT=${DEEPFIELD_TENANT:-}
      - DEEPFIELD_ZONE=${DEEPFIELD_ZONE:-}
      - DEEPFIELD_CLUSTER=${DEEPFIELD_CLUSTER:-}
      - DEEPFIELD_NAMESPACE=${DEEPFIELD_NAMESPACE:-}
    restart: unless-stopped

  gcl:
    image: quay.io/rh-ee-jkershaw/gcl-demo:latest
    ports:
      - "8001:8000"
    environment:
      GCL_RUNTIME_MODE: standalone-test
      GCL_FORCE_DETERMINISTIC: "1"
      GCL_LEDGER_SKIP: "1"

  # Optional: uncomment to add PostgreSQL persistence
